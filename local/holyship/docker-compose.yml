## Holy Ship stack — Postgres, API, UI, Caddy
##
## Usage:
##   docker compose up -d
##   docker compose logs -f
##
## Ports (via Caddy):
##   80/443  → holyship.wtf (UI) + api.holyship.wtf (API)
##
## Direct ports (bypass Caddy, local dev):
##   3001 → holyship API
##   3000 → holyship UI

services:
  # ---------------------------------------------------------------------------
  # Postgres
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: holyship-postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/create-multiple-databases.sh:/docker-entrypoint-initdb.d/create-multiple-databases.sh:ro
    environment:
      POSTGRES_USER: holyship
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: holyship
      POSTGRES_MULTIPLE_DATABASES: nbxplorer,btcpayserver
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U holyship"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - holyship

  # ---------------------------------------------------------------------------
  # Holy Ship API
  # ---------------------------------------------------------------------------
  api:
    image: ${HOLYSHIP_API_IMAGE:-ghcr.io/wopr-network/holyship:latest}
    build:
      context: ${HOLYSHIP_SRC:-../../../holyship}
      dockerfile: Dockerfile
    container_name: holyship-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://holyship:${POSTGRES_PASSWORD}@postgres:5432/holyship
      PORT: "3001"
      HOST: "0.0.0.0"
      HOLYSHIP_ADMIN_TOKEN: ${HOLYSHIP_ADMIN_TOKEN}
      HOLYSHIP_WORKER_TOKEN: ${HOLYSHIP_WORKER_TOKEN}
      GITHUB_APP_ID: ${GITHUB_APP_ID}
      GITHUB_APP_PRIVATE_KEY: ${GITHUB_APP_PRIVATE_KEY}
      GITHUB_APP_CLIENT_ID: ${GITHUB_APP_CLIENT_ID}
      GITHUB_APP_CLIENT_SECRET: ${GITHUB_APP_CLIENT_SECRET}
      GITHUB_CLIENT_ID: ${GITHUB_APP_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_APP_CLIENT_SECRET}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${NEXT_PUBLIC_API_URL:-https://api.holyship.wtf}
      UI_ORIGIN: ${UI_ORIGIN:-https://holyship.wtf}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      FLEET_DATA_DIR: /tmp/fleet
      # Worker pool — ephemeral holyshipper containers
      HOLYSHIP_WORKER_IMAGE: ${HOLYSHIP_WORKER_IMAGE:-ghcr.io/wopr-network/wopr-holyshipper-coder:latest}
      HOLYSHIP_GATEWAY_KEY: ${HOLYSHIP_GATEWAY_KEY}
      HOLYSHIP_MODEL_TIER_OVERRIDE: ${HOLYSHIP_MODEL_TIER_OVERRIDE:-}
      DOCKER_NETWORK: holyship_holyship
      # BTCPay crypto payments
      BTCPAY_API_KEY: ${BTCPAY_API_KEY:-}
      BTCPAY_BASE_URL: http://btcpay:23002
      BTCPAY_STORE_ID: ${BTCPAY_STORE_ID:-}
      BTCPAY_WEBHOOK_SECRET: ${BTCPAY_WEBHOOK_SECRET:-}
      EVM_XPUB: ${EVM_XPUB:-}
      EVM_RPC_BASE: ${EVM_RPC_BASE:-https://mainnet.base.org}
    group_add:
      - "${DOCKER_GID:-1001}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    expose:
      - "3001"
    ports:
      - "3001:3001"
    restart: unless-stopped
    networks:
      - holyship

  # ---------------------------------------------------------------------------
  # Holy Ship UI (Next.js)
  # ---------------------------------------------------------------------------
  ui:
    image: ${HOLYSHIP_UI_IMAGE:-ghcr.io/wopr-network/holyship-platform-ui:latest}
    build:
      context: ${HOLYSHIP_UI_SRC:-../../../holyship-platform-ui}
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.holyship.wtf}
        API_INTERNAL_URL: http://api:3001
        NEXT_PUBLIC_GITHUB_APP_URL: ${NEXT_PUBLIC_GITHUB_APP_URL:-https://github.com/apps/holyship}
        NEXT_PUBLIC_BRAND_PRODUCT_NAME: ${NEXT_PUBLIC_BRAND_PRODUCT_NAME:-Holy Ship}
        NEXT_PUBLIC_BRAND_DOMAIN: ${NEXT_PUBLIC_BRAND_DOMAIN:-holyship.wtf}
        NEXT_PUBLIC_BRAND_TAGLINE: ${NEXT_PUBLIC_BRAND_TAGLINE:-It's what you'll say when you see the results.}
        NEXT_PUBLIC_BRAND_STORAGE_PREFIX: ${NEXT_PUBLIC_BRAND_STORAGE_PREFIX:-holyship}
        NEXT_PUBLIC_BRAND_HOME_PATH: ${NEXT_PUBLIC_BRAND_HOME_PATH:-/dashboard}
    container_name: holyship-ui
    depends_on:
      api:
        condition: service_healthy
    environment:
      API_INTERNAL_URL: http://api:3001
    expose:
      - "3000"
    ports:
      - "3002:3000"
    restart: unless-stopped
    networks:
      - holyship

  # ---------------------------------------------------------------------------
  # Caddy (reverse proxy, auto-TLS)
  # ---------------------------------------------------------------------------
  caddy:
    image: caddy:2-alpine
    container_name: holyship-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - holyship


  # ---------------------------------------------------------------------------
  # Bitcoind (regtest for local dev, mainnet for production)
  # ---------------------------------------------------------------------------
  bitcoind:
    image: btcpayserver/bitcoin:30.2
    container_name: holyship-bitcoind
    restart: unless-stopped
    environment:
      BITCOIN_NETWORK: ${BITCOIN_NETWORK:-regtest}
      BITCOIN_WALLETDIR: /data/wallets
      BITCOIN_EXTRA_ARGS: |-
        server=1
        rpcuser=btcpay
        rpcpassword=${BTCPAY_BITCOIND_PASSWORD:-btcpay-local}
        rpcallowip=0.0.0.0/0
        rpcbind=0.0.0.0
        fallbackfee=0.0002
        prune=550
    volumes:
      - bitcoin_data:/data
    networks:
      - holyship

  # ---------------------------------------------------------------------------
  # NBXplorer (blockchain indexer for BTCPay)
  # ---------------------------------------------------------------------------
  nbxplorer:
    image: nicolasdorier/nbxplorer:2.6.1
    container_name: holyship-nbxplorer
    restart: unless-stopped
    environment:
      NBXPLORER_NETWORK: ${BITCOIN_NETWORK:-regtest}
      NBXPLORER_CHAINS: btc
      NBXPLORER_BTCRPCURL: http://bitcoind:18443/
      NBXPLORER_BTCRPCUSER: btcpay
      NBXPLORER_BTCRPCPASSWORD: ${BTCPAY_BITCOIND_PASSWORD:-btcpay-local}
      NBXPLORER_BTCNODEENDPOINT: bitcoind:18444
      NBXPLORER_POSTGRES: User ID=holyship;Password=${POSTGRES_PASSWORD};Include Error Detail=true;Host=postgres;Port=5432;Database=nbxplorer
      NBXPLORER_AUTOMIGRATE: "1"
      NBXPLORER_BIND: 0.0.0.0:32838
      NBXPLORER_NOAUTH: "1"
    depends_on:
      postgres:
        condition: service_healthy
      bitcoind:
        condition: service_started
    networks:
      - holyship

  # ---------------------------------------------------------------------------
  # BTCPay Server (crypto payments)
  # ---------------------------------------------------------------------------
  btcpay:
    image: btcpayserver/btcpayserver:2.3.5
    container_name: holyship-btcpay
    restart: unless-stopped
    ports:
      - "14142:23002"
    environment:
      BTCPAY_NETWORK: ${BITCOIN_NETWORK:-regtest}
      BTCPAY_CHAINS: btc
      BTCPAY_POSTGRES: User ID=holyship;Password=${POSTGRES_PASSWORD};Include Error Detail=true;Host=postgres;Port=5432;Database=btcpayserver
      BTCPAY_BTCEXPLORERURL: http://nbxplorer:32838/
      BTCPAY_BIND: 0.0.0.0:23002
      BTCPAY_ALLOW-ADMIN-REGISTRATION: "true"
      BTCPAY_DISABLE-REGISTRATION: "false"
    depends_on:
      - nbxplorer
    networks:
      - holyship
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:23002/api/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s


volumes:
  postgres_data:
  caddy_data:
  caddy_config:
  bitcoin_data:

networks:
  holyship:
    driver: bridge
