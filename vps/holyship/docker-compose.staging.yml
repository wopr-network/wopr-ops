services:
  staging-postgres:
    image: postgres:16-alpine
    volumes:
      - staging_postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=holyship
      - POSTGRES_PASSWORD=${STAGING_POSTGRES_PASSWORD:-staging-pw}
      - POSTGRES_DB=holyship
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U holyship"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  staging-api:
    image: ghcr.io/wopr-network/holyship:staging
    group_add:
      - "988"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - staging_holyship_data:/tmp/fleet
    depends_on:
      staging-postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://holyship:${STAGING_POSTGRES_PASSWORD:-staging-pw}@staging-postgres:5432/holyship
      - PORT=3001
      - HOST=0.0.0.0
      - HOLYSHIP_ADMIN_TOKEN=${HOLYSHIP_ADMIN_TOKEN}
      - HOLYSHIP_WORKER_TOKEN=${HOLYSHIP_WORKER_TOKEN}
      - GITHUB_APP_ID=${GITHUB_APP_ID}
      - GITHUB_APP_PRIVATE_KEY=${GITHUB_APP_PRIVATE_KEY}
      - GITHUB_APP_CLIENT_ID=${GITHUB_APP_CLIENT_ID}
      - GITHUB_APP_CLIENT_SECRET=${GITHUB_APP_CLIENT_SECRET}
      - GITHUB_CLIENT_ID=${GITHUB_APP_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_APP_CLIENT_SECRET}
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET}
      - EMAIL_DISABLED=true
      - SKIP_EMAIL_VERIFICATION=true
      - BETTER_AUTH_SECRET=${STAGING_BETTER_AUTH_SECRET}
      - COOKIE_DOMAIN=.staging.holyship.wtf
      - BETTER_AUTH_URL=https://staging.api.holyship.wtf
      - UI_ORIGIN=https://staging.holyship.wtf
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STAGING_STRIPE_WEBHOOK_SECRET:-${STRIPE_WEBHOOK_SECRET}}
      - HOLYSHIP_GATEWAY_KEY=${HOLYSHIP_GATEWAY_KEY}
      - HOLYSHIP_PLATFORM_SERVICE_KEY=${HOLYSHIP_PLATFORM_SERVICE_KEY:-}
      - HOLYSHIP_WORKER_IMAGE=ghcr.io/wopr-network/wopr-holyshipper-coder:latest
      - HOLYSHIP_MODEL_TIER_OVERRIDE=${HOLYSHIP_MODEL_TIER_OVERRIDE:-}
      - DOCKER_NETWORK=holyship
      - REGISTRY_USERNAME=${REGISTRY_USERNAME}
      - REGISTRY_PASSWORD=${REGISTRY_PASSWORD}
      - REGISTRY_SERVER=${REGISTRY_SERVER}
      - FLEET_DATA_DIR=/tmp/fleet
      - NODE_ENV=staging
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3001/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  staging-ui:
    image: ghcr.io/wopr-network/holyship-ui:staging
    environment:
      - NEXT_PUBLIC_API_URL=https://staging.api.holyship.wtf
      - BETTER_AUTH_URL=https://staging.api.holyship.wtf
      - NEXT_PUBLIC_GITHUB_APP_URL=https://github.com/apps/holy-ship
      - NEXT_PUBLIC_BRAND_PRODUCT_NAME=Holy Ship
      - NEXT_PUBLIC_BRAND_DOMAIN=staging.holyship.wtf
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000', (r) => process.exit(r.statusCode === 200 ? 0 : 1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  staging_postgres_data:
  staging_holyship_data:
