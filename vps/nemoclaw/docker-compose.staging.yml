services:
  staging-postgres:
    image: postgres:16-alpine
    volumes:
      - staging_pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: nemoclaw_platform
      POSTGRES_USER: nemoclaw
      POSTGRES_PASSWORD: ${STAGING_POSTGRES_PASSWORD:-staging-pw}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nemoclaw -d nemoclaw_platform"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  staging-api:
    image: ghcr.io/wopr-network/nemoclaw-platform:staging
    user: "0:0"
    restart: unless-stopped
    depends_on:
      staging-postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://nemoclaw:${STAGING_POSTGRES_PASSWORD:-staging-pw}@staging-postgres:5432/nemoclaw_platform
      - PORT=3100
      - PLATFORM_DOMAIN=staging.nemopod.com
      - PROVISION_SECRET=${PROVISION_SECRET}
      - NEMOCLAW_IMAGE=${NEMOCLAW_IMAGE:-ghcr.io/wopr-network/nemoclaw:latest}
      - NEMOCLAW_CONTAINER_PORT=3100
      - FLEET_DOCKER_NETWORK=nemoclaw-platform_default
      - GATEWAY_URL=https://staging.api.nemopod.com/v1
      - POOL_SIZE_DEFAULT=2
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - RESEND_API_KEY=re_staging_disabled
      - EMAIL_DISABLED=true
      - SKIP_EMAIL_VERIFICATION=true
      - BETTER_AUTH_SECRET=${STAGING_BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=https://staging.api.nemopod.com
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STAGING_STRIPE_WEBHOOK_SECRET:-${STRIPE_WEBHOOK_SECRET}}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - NODE_ENV=production
    volumes:
      - staging_fleet_data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3100/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))\""]
      interval: 30s
      timeout: 5s
      retries: 3

  staging-ui:
    image: ghcr.io/wopr-network/nemoclaw-platform-ui:staging
    restart: unless-stopped
    depends_on:
      staging-api:
        condition: service_healthy
    environment:
      - NEXT_PUBLIC_API_URL=https://staging.api.nemopod.com
      - BETTER_AUTH_URL=https://staging.api.nemopod.com
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000', (r) => process.exit(r.statusCode === 200 ? 0 : 1))\""]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  staging_pgdata:
  staging_fleet_data:
